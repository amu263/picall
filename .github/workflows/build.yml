name: Picall Android CI/CD

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  GRADLE_VERSION: '8.9'
  ANDROID_COMPILE_SDK: '36'
  ANDROID_BUILD_TOOLS: '36.0.0'

jobs:
  # ──────────────────────────────────────
  #  1. 代码检查
  # ──────────────────────────────────────
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_COMPILE_SDK }}
          build-tools: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-disabled: false

      - name: Run Lint
        run: ./gradlew lint --no-daemon

      - name: Upload Lint Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: app/build/reports/lint-results*.html
          retention-days: 7

  # ──────────────────────────────────────
  #  2. 构建 Debug APK
  # ──────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    if: ${{ !cancelled() && (needs.lint.result == 'success' || needs.lint.result == 'skipped') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_COMPILE_SDK }}
          build-tools: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-disabled: false

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: picall-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          compression-level: 6

  # ──────────────────────────────────────
  #  3. 构建 Release AAB (仅 main/master 分支)
  # ──────────────────────────────────────
  build-release:
    name: Build Release AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    if: |
      !cancelled() &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_COMPILE_SDK }}
          build-tools: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-disabled: false

      - name: Decode Signing Keystore
        if: ${{ vars.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ vars.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Build Release AAB
        run: ./gradlew bundleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: picall-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
          compression-level: 6

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: picall-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          compression-level: 6

  # ──────────────────────────────────────
  #  4. 构建报告汇总
  # ──────────────────────────────────────
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-debug, build-release]
    if: ${{ !cancelled() }}
    steps:
      - name: Report Status
        run: |
          echo "## Picall CI/CD 构建报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Debug | ${{ needs.build-debug.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Release | ${{ needs.build-release.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 Debug APK → \`Actions → Artifacts → picall-debug\`" >> $GITHUB_STEP_SUMMARY
          echo "📦 Release AAB → \`Actions → Artifacts → picall-release-aab\`" >> $GITHUB_STEP_SUMMARY
